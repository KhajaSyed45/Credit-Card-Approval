<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="site-nav">
        <div class="nav-brand">Credit Approval</div>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="#form">Predict</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="{{ url_for('history') }}">History</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="form-hero">
            <div>
                <p class="eyebrow">Prediction</p>
                <h1>Predict applicant approval status</h1>
                <p class="hero-copy">Complete the form below to get a decision-support prediction for the applicant status.</p>
            </div>
        </section>

        <section id="form" class="prediction-form">
            <form action="/predict" method="post" aria-label="Credit approval form">
                <div class="grid-two">
                    <div>
                        <label>Gender</label>
                        <select name="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div>
                        <label>Income Type</label>
                        <select name="income_type" required>
                            <option value="Working">Working</option>
                            <option value="Commercial associate">Commercial associate</option>
                            <option value="Pensioner">Pensioner</option>
                            <option value="State servant">State servant</option>
                            <option value="Student">Student</option>
                        </select>
                    </div>
                </div>

                <div class="grid-two">
                    <div>
                        <label>Annual Income</label>
                        <input type="number" step="0.01" name="annual_income" placeholder="e.g. 42000" required>
                    </div>
                    <div>
                        <label>Employment Duration</label>
                        <input type="number" step="0.1" name="employment_duration" placeholder="e.g. 3.5" required>
                    </div>
                </div>

                <div class="grid-two">
                    <div>
                        <label>Education Level</label>
                        <select name="education_level" required>
                            <option value="Secondary">Secondary</option>
                            <option value="Higher education">Higher education</option>
                            <option value="Incomplete higher">Incomplete higher</option>
                            <option value="Lower secondary">Lower secondary</option>
                            <option value="Academic degree">Academic degree</option>
                        </select>
                    </div>
                    <div>
                        <label>Family Status</label>
                        <select name="family_status" required>
                            <option value="Married">Married</option>
                            <option value="Single / not married">Single / not married</option>
                            <option value="Civil marriage">Civil marriage</option>
                            <option value="Separated">Separated</option>
                            <option value="Widow">Widow</option>
                        </select>
                    </div>
                </div>

                <div class="grid-two">
                    <div>
                        <label>Housing Type</label>
                        <select name="housing_type" required>
                            <option value="House / apartment">House / apartment</option>
                            <option value="Rented apartment">Rented apartment</option>
                            <option value="With parents">With parents</option>
                            <option value="Municipal apartment">Municipal apartment</option>
                            <option value="Office apartment">Office apartment</option>
                        </select>
                    </div>
                    <div>
                        <label>Age</label>
                        <input type="number" name="age" placeholder="e.g. 30" required>
                    </div>
                </div>

                <div class="grid-two">
                    <div>
                        <label>Children Count</label>
                        <input type="number" name="children_count" value="0" required>
                    </div>
                    <div>
                        <label>Past Due Flag</label>
                        <select name="past_due_flag" required>
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label>Credit Inquiries</label>
                    <input type="number" name="credit_inquiries" value="0" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="button button-primary">Predict</button>
                    <a href="{{ url_for('home') }}" class="button button-secondary">Back to Home</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
