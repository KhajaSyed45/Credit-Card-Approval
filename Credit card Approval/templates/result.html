<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="site-nav">
        <div class="nav-brand">Credit Approval</div>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('predict_page') }}">Predict</a></li>
            <li><a href="{{ url_for('history') }}">History</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="result-card">
            <p class="eyebrow">Prediction result</p>
            <h1>{{ prediction }}</h1>
            <p class="hero-copy">Approval Probability: <strong>{{ probability }}</strong></p>
            <div class="form-actions">
                <a href="{{ url_for('predict_page') }}" class="button button-primary">Try another applicant</a>
                <a href="{{ url_for('home') }}" class="button button-secondary">Back to Home</a>
            </div>
        </section>
    </main>
</body>
</html>
